# sec WS9-F4 (#1418), epic #1389 — supply-chain image integrity.
#
# WS9-F4 pins the fleet's base images by @sha256 digest
# (docker/Dockerfile.base, docker/Dockerfile.hindsight). A pinned
# digest is only safe if there's a *reviewed* path to move it forward
# when upstream ships security fixes — otherwise operators run a
# frozen, eventually-vulnerable base. Dependabot's `docker` ecosystem
# raises those digest bumps as PRs (gated by the same 15 required
# checks as any other change). The `github-actions` ecosystem does the
# same for the SHA-pinned actions introduced by #1405/WS9-F1/F6 —
# without it those pins rot the same way.
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "security"
    # WS9-F4's intent is reviewed *digest* refreshes of the pinned
    # base images (security rebuilds WITHIN the chosen, tested major)
    # — not being dragged onto a brand-new Node major that breaks the
    # build. Unconstrained, Dependabot proposed node 22→26 (#1438,
    # e2e-red). Ignore major/minor version-updates for node so it only
    # raises digest + 22.x-patch PRs; a base-image major bump is a
    # deliberate, separately-validated decision, never an auto-PR.
    # (hindsight is pinned via `:latest@sha256` — no semver applies, so
    # its digest-follow PRs are unaffected by this rule.)
    ignore:
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "security"
