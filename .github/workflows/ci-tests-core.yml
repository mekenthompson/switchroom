name: ci-tests-core

# Vitest core suite. Three GHA-native optimisations on top of the
# Buildkite shape:
#
#   1. Build `dist/` ONCE in a precursor job + share via artifact.
#      Several integration tests (cli.issues, run-hook, boot-self-test)
#      shell out to dist/cli/switchroom.js. Pre-#1320 every shard
#      rebuilt independently (~5-10s × 4 = 20-40s wasted). Now the
#      build job uploads dist/ as an artifact and each shard downloads
#      it — total build cost is paid once.
#
#   2. `vitest --changed` on PRs. Vitest traces the import graph and
#      runs only test files affected by changed source. A typical
#      one-file PR runs ~5-50 tests instead of ~3000, slashing
#      ci-tests-core from ~1m10s to ~20-30s on the common case.
#      Push to main runs the full suite — we don't gamble on main.
#
#   3. 4-way matrix sharding (carryover from #1320). With --changed
#      the per-shard surface drops to a handful of files; shards still
#      run in parallel for the few cases where many tests are affected.
#
# Sharding determinism: `vitest --shard X/Y` hashes test file paths so
# a given file always lands in the same shard for a given Y. The
# --changed filter applies first, then sharding splits the survivors.
#
# Fork-pool tuning: VITEST_MAX_FORKS=2 honored by vitest.config.ts.
# On a 2-vCPU runner that's 2 concurrent workers per shard, with all
# 4 shards running on separate runners (matrix-parallel, not
# co-located). Net: comfortable, not oversubscribed.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual recovery lever. GHA marks a run failed (no auto-retry) when
  # its jobs sit queued past the hosted-runner scheduling window during
  # a capacity blip; `gh run rerun` then refuses ("cannot be retried")
  # on the stale run. workflow_dispatch gives `gh workflow run
  # ci-tests-core.yml --ref main` as the re-trigger. (#1336 queue-fail
  # surfaced this gap.)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Path-change filter (sentinel pattern) ────────────────────────
  # Real work runs in the `vitest-shard` matrix (path-gated, may skip).
  # The branch-protection-required context is the `vitest` SENTINEL
  # below — it ALWAYS runs and aggregates the shards, so a docs-only
  # PR (shards skipped) still reports pass instead of blocking (#1343).
  # NOTE: branch protection must require `vitest` (the sentinel), NOT
  # the old `vitest (1..4)` matrix contexts — see the PR description
  # for the one-time required-status-checks retune.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        with:
          filters: |
            relevant:
              - 'src/**'
              - 'tests/**'
              - 'telegram-plugin/**/*.ts'
              - 'scripts/build.mjs'
              - 'vitest.config.ts'
              - 'tsconfig.json'
              - 'package.json'
              - 'bun.lock'
              - 'telegram-plugin/package.json'
              - 'telegram-plugin/bun.lock'
              - '.github/actions/setup-switchroom/**'
              - '.github/workflows/ci-tests-core.yml'
              # sec WS9-F1 (#1402): security-load-bearing non-src paths.
              # profiles/ renders every agent's start.sh + the WS8
              # tool-safety hooks; bin/*-hook.sh + skills/ are baked into
              # the agent image; docker/ + workflows are the supply-chain
              # root. Without these a profiles/bin/skills/docker/.github-
              # only PR skipped→passed this required gate with no tests.
              # The scaffold/profile-render tests live under src/+tests/
              # which this `vitest` sentinel runs.
              - 'profiles/**'
              - 'bin/**'
              - 'skills/**'
              - 'docker/**'
              - '.github/workflows/**'

  # ─── Build dist/ once, share with all shards ──────────────────────
  build-dist:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up workspace
        uses: ./.github/actions/setup-switchroom

      - name: Build dist/
        run: bun scripts/build.mjs

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-built
          path: dist/
          # 1-day retention is plenty — the artifact is consumed by
          # the shard jobs that fire within minutes.
          retention-days: 1
          if-no-files-found: error

  # ─── Sharded vitest run ───────────────────────────────────────────
  # Renamed vitest → vitest-shard so the required context is the
  # always-running `vitest` sentinel, not the path-skippable matrix
  # contexts `vitest (1..4)` (those blocked docs-only PRs, #1343).
  vitest-shard:
    needs: [changes, build-dist]
    if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      TELEGRAM_BOT_TOKEN: "123456:stub-for-tests"
      VITEST_MAX_FORKS: "2"
    steps:
      - name: Checkout
        # fetch-depth: 0 is required so `vitest --changed` can resolve
        # the merge-base against the PR's target branch. The default
        # shallow clone (depth: 1) breaks --changed silently — vitest
        # falls back to running everything, defeating the optimisation.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up workspace
        # install-jq=true — tests/boot-self-test.test.ts shells
        # boot-self-test.sh which jq-parses `switchroom auth heal --json`.
        uses: ./.github/actions/setup-switchroom
        with:
          install-jq: "true"

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-built
          path: dist/

      - name: Restore exec bits on bundled CLIs
        # actions/upload-artifact@v4 stores artifacts as zip and strips
        # POSIX exec bits on download. scripts/build.mjs chmods every
        # entry-point bundle 0o755 because the runtime invokes them
        # directly (start.sh shells `switchroom`, claude spawns the
        # hooks, autoaccept-poll is exec'd). Without re-applying here,
        # tests/autoaccept-poll-bundled.test.ts fails on `st.mode &
        # 0o100 !== 0` — silently red on every push-to-main since #1323
        # introduced the shared-artifact pattern.
        run: |
          chmod +x dist/cli/*.js dist/cli/*.mjs 2>/dev/null || true
          ls -l dist/cli/

      - name: Vitest shard ${{ matrix.shard }}/4 (PR — changed-files only)
        if: github.event_name == 'pull_request'
        # --changed traces the import graph from files changed against
        # the PR base; vitest runs every test that transitively depends
        # on a changed module. --passWithNoTests is mandatory: when a
        # shard's slice happens to contain zero affected tests, the
        # default behaviour is exit 1.
        run: |
          bunx vitest run \
            --shard ${{ matrix.shard }}/4 \
            --changed origin/${{ github.base_ref }} \
            --passWithNoTests

      - name: Vitest shard ${{ matrix.shard }}/4 (push to main — full suite)
        if: github.event_name == 'push'
        run: bunx vitest run --shard ${{ matrix.shard }}/4

      - name: Upload coverage (if produced)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ─── Sentinel ─────────────────────────────────────────────────────
  # Branch-protection-required context. ALWAYS runs and aggregates the
  # 4 shards. `needs.vitest-shard.result` is success only if every
  # matrix shard succeeded, failure if any failed, skipped if the whole
  # matrix was path-skipped (irrelevant PR → pass). Branch protection
  # must require `vitest` (this job), NOT `vitest (1..4)`.
  vitest:
    needs: [changes, vitest-shard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verdict
        run: |
          c='${{ needs.changes.result }}'
          r='${{ needs.vitest-shard.result }}'
          if [ "$c" = "failure" ] || [ "$c" = "cancelled" ]; then
            echo "::error::changes=$c — path-filter infra failed; can't trust skip"
            exit 1
          fi
          if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
            echo "::error::vitest-shard=$r — a shard failed, blocking"
            exit 1
          fi
          echo "changes=$c vitest-shard=$r → pass (all shards green, or skipped on irrelevant PR)"
