name: ci-tests-plugin

# Bun test suite for telegram-plugin/ (bun-runtime-only tests that vitest
# can't load).
#
# Skip-as-pass pattern (#1320 followup): see ci-lint.yml header.
#
# Workspace install discipline: we do NOT `cd telegram-plugin && bun install`.
# telegram-plugin is a bun workspace of the root, and the root install via
# the composite action already brings in its deps via the hoisted node_modules.
# A per-package install creates a shadow `@mtcute/node` that breaks
# vi.mock-based driver tests — see the long comment block in
# .github/actions/setup-switchroom/action.yml for the full diagnosis.
# Tests run against the hoisted root install.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual recovery lever. GHA marks a run failed (no auto-retry) when
  # its jobs sit queued past the hosted-runner scheduling window during
  # a capacity blip; `gh run rerun` then refuses ("cannot be retried")
  # on the stale run. workflow_dispatch gives `gh workflow run
  # ci-tests-plugin.yml --ref main` as the re-trigger. (#1336 queue-fail
  # surfaced this gap.)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        with:
          filters: |
            relevant:
              - 'telegram-plugin/**'
              - 'package.json'
              - 'bun.lock'
              - 'telegram-plugin/package.json'
              - 'telegram-plugin/bun.lock'
              - '.github/actions/setup-switchroom/**'
              - '.github/workflows/ci-tests-plugin.yml'
              # sec WS9-F1 (#1402): don't skip→pass the required gate on
              # a security-load-bearing non-telegram-plugin change. See
              # ci-tests-core.yml for the rationale.
              - 'profiles/**'
              - 'bin/**'
              - 'skills/**'
              - 'docker/**'
              - '.github/workflows/**'

  bun-test-run:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TELEGRAM_BOT_TOKEN: "123456:stub-for-tests"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up workspace
        uses: ./.github/actions/setup-switchroom

      - name: Bun test (telegram-plugin)
        # Same explicit dir list as Buildkite — running `bun test` with no
        # args recurses into telegram-plugin/uat/scenarios/ which fail
        # without TELEGRAM_API_ID/HASH. The dir list scopes to the unit
        # surface only.
        working-directory: telegram-plugin
        run: |
          bun test \
            admin-commands gateway registry secret-detect tests \
            channel-envelope-safety.test.ts

  # ─── Sentinel ─────────────────────────────────────────────────────
  # Branch-protection-required context. ALWAYS runs so it always
  # reports. See ci-lint.yml for the rationale (corrects #1331's
  # if:-skip approach that blocked docs-only PRs, e.g. #1343).
  bun-test:
    needs: [changes, bun-test-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verdict
        run: |
          c='${{ needs.changes.result }}'
          r='${{ needs.bun-test-run.result }}'
          if [ "$c" = "failure" ] || [ "$c" = "cancelled" ]; then
            echo "::error::changes=$c — path-filter infra failed; can't trust skip"
            exit 1
          fi
          if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
            echo "::error::bun-test-run=$r — real test failure, blocking"
            exit 1
          fi
          echo "changes=$c bun-test-run=$r → pass (ran=success, or skipped on irrelevant PR)"
