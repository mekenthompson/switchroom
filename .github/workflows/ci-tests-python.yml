name: ci-tests-python

# Python tests for vendored Hindsight scripts. Mirrors Buildkite
# :snake: Python tests (Hindsight scripts). No bun, no node — pure
# python3 stdlib unittest.
#
# Skip-as-pass pattern (#1320 followup): see ci-lint.yml header.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual recovery lever. GHA marks a run failed (no auto-retry) when
  # its jobs sit queued past the hosted-runner scheduling window during
  # a capacity blip; `gh run rerun` then refuses ("cannot be retried")
  # on the stale run. workflow_dispatch gives `gh workflow run
  # ci-tests-python.yml --ref main` as the re-trigger. (#1336 queue-fail
  # surfaced this gap.)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        with:
          filters: |
            relevant:
              - 'vendor/hindsight-memory/scripts/**'
              - '.github/workflows/ci-tests-python.yml'

  unittest:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run unittest discover
        working-directory: vendor/hindsight-memory/scripts
        run: python3 -m unittest discover tests/
