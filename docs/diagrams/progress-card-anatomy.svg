<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Anatomy of a Switchroom progress card.">
  <defs>
    <style><![CDATA[
      .sans { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .h    { font: 700 18px 'Inter', system-ui, sans-serif; fill: #23282F; }
      .body { font: 500 14px 'Inter', system-ui, sans-serif; fill: #23282F; }
      .cap  { font: italic 500 11px 'Inter', system-ui, sans-serif; fill: #5A6069; }
      .num  { font: 700 13px 'Inter', system-ui, sans-serif; fill: #FAF7EF; }
      .lead { fill: none; stroke: #8A8F98; stroke-width: 1.4; stroke-dasharray: 2 4; stroke-linecap: round; }
      .pulse { animation: pulse 1.6s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    ]]></style>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#14171C" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect fill="#FAF7EF" width="1200" height="800"/>

  <!-- accent dots (shared coords across all 3 diagrams) -->
  <g fill="#E8B657" opacity="0.55">
    <circle cx="80" cy="80" r="4"/><circle cx="1120" cy="120" r="4"/>
    <circle cx="60" cy="720" r="4"/><circle cx="1140" cy="700" r="4"/>
  </g>
  <g fill="#C8302C" opacity="0.5">
    <circle cx="160" cy="140" r="3"/><circle cx="1080" cy="640" r="3"/>
  </g>

  <!-- Title -->
  <text class="h" x="60" y="76">Progress card anatomy</text>
  <text class="cap" x="60" y="96">a pinned Telegram message that updates as tools fire</text>

  <!-- THE DARK CARD (a "guest" Telegram message on light canvas) -->
  <g transform="translate(380,150) rotate(-1.2)" filter="url(#cardShadow)">
    <rect fill="#14171C" stroke="#EDE7D7" stroke-width="1.5" x="0" y="0" width="440" height="540" rx="14"/>
    <rect fill="#C8302C" x="0" y="0" width="4" height="540" rx="2"/>

    <!-- pin badge row -->
    <g transform="translate(22,26)">
      <circle cx="10" cy="10" r="10" fill="#E8B657"/>
      <path d="M10 5 L10 15 M5 10 L15 10" stroke="#14171C" stroke-width="1.6" stroke-linecap="round"/>
      <text class="sans" x="28" y="14" font-size="13" font-weight="600" fill="#F5F1E8">@worker · refactor-auth</text>
      <text class="mono" x="28" y="30" font-size="10" fill="#8A8F98">pinned · 02:13</text>
    </g>

    <!-- user prompt blockquote -->
    <g transform="translate(22,80)">
      <rect x="0" y="0" width="396" height="58" rx="8" fill="#1A1E25"/>
      <rect x="0" y="0" width="3" height="58" rx="1.5" fill="#4A9B8E"/>
      <text class="sans" x="14" y="22" font-size="12" fill="#B8BCC3">refactor login flow to use the new</text>
      <text class="sans" x="14" y="40" font-size="12" fill="#B8BCC3">session kernel — keep tests green</text>
    </g>

    <!-- last 5 visible tool steps -->
    <g transform="translate(22,158)" font-family="'JetBrains Mono', monospace" font-size="11">
      <text x="0" y="0" fill="#5A6069">⤷ Read   src/auth/login.ts             0.4s</text>
      <text x="0" y="20" fill="#8A8F98">⤷ Grep   "session" src/                0.7s</text>
      <text x="0" y="40" fill="#B8BCC3">⤷ Read   src/kernel/session.ts         0.3s</text>
      <text x="0" y="60" fill="#DADDE2">⤷ Edit   src/auth/login.ts             1.1s</text>

      <!-- sub-agent indent -->
      <text x="20" y="84" fill="#E8B657">└─ @reviewer  spawned</text>
      <text x="34" y="104" fill="#DADDE2">⤷ Read   src/auth/login.ts        0.2s</text>
    </g>

    <!-- in-flight pulse row -->
    <g transform="translate(22,288)" class="pulse">
      <circle cx="6" cy="6" r="5" fill="#C8302C"/>
      <text class="mono" x="20" y="10" font-size="11" fill="#F5F1E8">Bash  npm test            running…</text>
    </g>

    <!-- divider -->
    <line x1="22" y1="316" x2="418" y2="316" stroke="#23282F" stroke-width="1"/>

    <!-- footer timer -->
    <g transform="translate(22,338)">
      <text class="mono" x="0" y="14" font-size="11" fill="#8A8F98">elapsed 1m 47s · 12 tools · 3 files touched</text>
      <text class="mono" x="0" y="32" font-size="11" fill="#5A6069">/cancel  /pause  /steer</text>
    </g>
  </g>

  <!-- Numbered callouts (brass = numeric labels) -->
  <!-- 1 pin badge -->
  <g>
    <line class="lead" x1="240" y1="180" x2="380" y2="174"/>
    <circle cx="220" cy="180" r="16" fill="#E8B657"/>
    <text class="num" x="220" y="184" text-anchor="middle">1</text>
    <text class="body" x="60" y="184">pin badge + agent</text>
    <text class="cap" x="60" y="200">who is working, when pinned</text>
  </g>

  <!-- 2 user prompt -->
  <g>
    <line class="lead" x1="240" y1="252" x2="378" y2="246"/>
    <circle cx="220" cy="252" r="16" fill="#E8B657"/>
    <text class="num" x="220" y="256" text-anchor="middle">2</text>
    <text class="body" x="60" y="256">user prompt quote</text>
    <text class="cap" x="60" y="272">teal stripe = your message</text>
  </g>

  <!-- 3 last 5 visible -->
  <g>
    <line class="lead" x1="240" y1="334" x2="378" y2="328"/>
    <circle cx="220" cy="334" r="16" fill="#E8B657"/>
    <text class="num" x="220" y="338" text-anchor="middle">3</text>
    <text class="body" x="60" y="338">last 5 tool calls</text>
    <text class="cap" x="60" y="354">fade older, latest brightest</text>
  </g>

  <!-- 4 sub-agent indent -->
  <g>
    <line class="lead" x1="240" y1="430" x2="378" y2="430"/>
    <circle cx="220" cy="430" r="16" fill="#E8B657"/>
    <text class="num" x="220" y="434" text-anchor="middle">4</text>
    <text class="body" x="60" y="434">sub-agent indent</text>
    <text class="cap" x="60" y="450">brass header, child rows nested</text>
  </g>

  <!-- 5 in-flight pulse (cord = wait/warning role per spec) -->
  <g>
    <line class="lead" x1="850" y1="440" x2="822" y2="440"/>
    <circle cx="870" cy="440" r="16" fill="#C8302C"/>
    <text class="num" x="870" y="444" text-anchor="middle">5</text>
    <text class="body" x="900" y="444">in-flight pulse</text>
    <text class="cap" x="900" y="460">cord dot, opacity loops</text>
  </g>

  <!-- 6 footer timer -->
  <g>
    <line class="lead" x1="850" y1="528" x2="822" y2="528"/>
    <circle cx="870" cy="528" r="16" fill="#E8B657"/>
    <text class="num" x="870" y="532" text-anchor="middle">6</text>
    <text class="body" x="900" y="532">footer timer + slash</text>
    <text class="cap" x="900" y="548">elapsed, tools, file count</text>
  </g>

  <text class="cap" x="600" y="752" text-anchor="middle">one card, replaced in place — phone never floods, terminal never hides</text>
</svg>
