<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500" role="img" aria-label="Wake-audit lifecycle.">
  <defs>
    <style><![CDATA[
      .sans  { font-family: 'Inter', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif; }
      .mono  { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
      .ttl   { font-family: 'Inter', system-ui, sans-serif; font-size: 22px; font-weight: 700; fill: #14171C; }
      .lbl   { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 700; fill: #14171C; }
      .sub   { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #5A6069; }
      .caption { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 17px; fill: #5A6069; }
    ]]></style>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#14171C" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect fill="#FAF7EF" width="1600" height="500"/>

  <!-- accent dots -->
  <g fill="#E8B657" opacity="0.55">
    <circle cx="60" cy="60" r="4"/>
    <circle cx="1540" cy="80" r="4"/>
    <circle cx="80" cy="450" r="4"/>
    <circle cx="1520" cy="440" r="4"/>
  </g>
  <g fill="#C8302C" opacity="0.5">
    <circle cx="200" cy="40" r="3"/>
    <circle cx="1400" cy="460" r="3"/>
  </g>

  <!-- caption (above) -->
  <text class="caption" x="800" y="80" text-anchor="middle">things die. switchroom comes back, with receipts.</text>

  <!-- DASHED TIMELINE (behind cards) -->
  <line x1="160" y1="280" x2="1440" y2="280" stroke="#B8BCC3" stroke-width="2" stroke-dasharray="2 8" stroke-linecap="round"/>
  <!-- accent dots on the line, between stations -->
  <g fill="#E8B657">
    <circle cx="320" cy="280" r="3.5"/>
    <circle cx="600" cy="280" r="3.5"/>
    <circle cx="880" cy="280" r="3.5"/>
    <circle cx="1160" cy="280" r="3.5"/>
  </g>

  <!-- =========== 5 STATIONS =========== -->
  <!-- Station 1: agent killed (skull) -->
  <g transform="translate(160,180) rotate(-1.5)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="200" rx="14" fill="#FAF7EF" stroke="#EDE7D7" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="#C8302C"/>
    <!-- skull icon (SVG path) -->
    <g transform="translate(70,28)" fill="none" stroke="#C8302C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M30 4 C 14 4, 4 16, 4 30 C 4 40, 10 47, 14 50 L14 56 C 14 58, 16 60, 18 60 L20 60 L20 54 L24 54 L24 60 L36 60 L36 54 L40 54 L40 60 L42 60 C 44 60, 46 58, 46 56 L46 50 C 50 47, 56 40, 56 30 C 56 16, 46 4, 30 4 z"/>
      <circle cx="20" cy="30" r="4" fill="#C8302C"/>
      <circle cx="40" cy="30" r="4" fill="#C8302C"/>
      <path d="M26 42 L30 46 L34 42"/>
    </g>
    <text class="lbl" x="100" y="124" text-anchor="middle">agent killed</text>
    <text class="sub" x="100" y="148" text-anchor="middle">watchdog · SIGTERM</text>
    <text class="sub" x="100" y="166" text-anchor="middle">crash · timeout</text>
  </g>

  <!-- Station 2: crash-pane snapshot (camera) -->
  <g transform="translate(440,200) rotate(1.5)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="200" rx="14" fill="#FAF7EF" stroke="#EDE7D7" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="#E8B657"/>
    <!-- camera icon -->
    <g transform="translate(70,30)" fill="none" stroke="#B8873A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 18 h12 l4 -6 h20 l4 6 h12 a4 4 0 0 1 4 4 v28 a4 4 0 0 1 -4 4 h-52 a4 4 0 0 1 -4 -4 v-28 a4 4 0 0 1 4 -4 z"/>
      <circle cx="30" cy="36" r="10"/>
      <circle cx="30" cy="36" r="4" fill="#E8B657"/>
      <rect x="48" y="22" width="6" height="3" rx="1" fill="#B8873A"/>
    </g>
    <text class="lbl" x="100" y="124" text-anchor="middle">crash snapshot</text>
    <text class="sub" x="100" y="148" text-anchor="middle">tmux scrollback</text>
    <text class="sub" x="100" y="166" text-anchor="middle">dumped to disk</text>
  </g>

  <!-- Station 3: systemd restart (circular arrows) -->
  <g transform="translate(720,180) rotate(-1)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="200" rx="14" fill="#FAF7EF" stroke="#EDE7D7" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="#4A9B8E"/>
    <!-- circular arrow icon -->
    <g transform="translate(70,30)" fill="none" stroke="#4A9B8E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M52 30 a22 22 0 1 1 -7 -16"/>
      <polyline points="44,4 45,16 33,17"/>
      <path d="M8 30 a22 22 0 0 0 7 16" stroke-opacity="0.4"/>
    </g>
    <text class="lbl" x="100" y="124" text-anchor="middle">systemd restart</text>
    <text class="sub" x="100" y="148" text-anchor="middle">exit-code recovery</text>
    <text class="sub" x="100" y="166" text-anchor="middle">unit comes back up</text>
  </g>

  <!-- Station 4: wake-audit fires (clipboard) -->
  <g transform="translate(1000,200) rotate(1.5)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="200" rx="14" fill="#FAF7EF" stroke="#EDE7D7" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="#E8B657"/>
    <!-- clipboard icon -->
    <g transform="translate(72,28)" fill="none" stroke="#B8873A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="8" width="44" height="56" rx="4"/>
      <rect x="18" y="2" width="20" height="10" rx="2" fill="#B8873A"/>
      <line x1="14" y1="24" x2="42" y2="24"/>
      <line x1="14" y1="36" x2="42" y2="36"/>
      <line x1="14" y1="48" x2="34" y2="48"/>
    </g>
    <text class="lbl" x="100" y="124" text-anchor="middle">wake-audit fires</text>
    <text class="sub" x="100" y="148" text-anchor="middle">owed reply? orphan</text>
    <text class="sub" x="100" y="166" text-anchor="middle">sub-agent? open todo?</text>
  </g>

  <!-- Station 5: first turn acknowledges (speech bubble) -->
  <g transform="translate(1280,180) rotate(-1.5)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="200" rx="14" fill="#FAF7EF" stroke="#EDE7D7" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="#C8302C"/>
    <!-- speech bubble icon -->
    <g transform="translate(70,30)" fill="none" stroke="#C8302C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 14 a8 8 0 0 1 8 -8 h36 a8 8 0 0 1 8 8 v22 a8 8 0 0 1 -8 8 h-22 l-12 10 v-10 h-2 a8 8 0 0 1 -8 -8 z"/>
      <line x1="16" y1="20" x2="46" y2="20"/>
      <line x1="16" y1="28" x2="40" y2="28"/>
      <line x1="16" y1="36" x2="34" y2="36"/>
    </g>
    <text class="lbl" x="100" y="124" text-anchor="middle">first turn acknowledges</text>
    <text class="sub" x="100" y="148" text-anchor="middle">(a) start over</text>
    <text class="sub" x="100" y="164" text-anchor="middle">(b) summarize + continue</text>
    <text class="sub" x="100" y="180" text-anchor="middle">(c) drop</text>
  </g>
</svg>
