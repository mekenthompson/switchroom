<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Wake-audit lifecycle: from crash through fresh boot to silent-or-explicit acknowledgement.">
  <defs>
    <style><![CDATA[
      .sans { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .h    { font: 700 18px 'Inter', system-ui, sans-serif; fill: #23282F; }
      .ch   { font: 700 14px 'Inter', system-ui, sans-serif; fill: #23282F; }
      .body { font: 500 13px 'Inter', system-ui, sans-serif; fill: #23282F; }
      .cap  { font: italic 500 11px 'Inter', system-ui, sans-serif; fill: #5A6069; }
      .num  { font: 700 13px 'Inter', system-ui, sans-serif; fill: #FAF7EF; }
      .flow { fill: none; stroke: #C8302C; stroke-width: 2.5; stroke-linecap: round; }
      .icon { fill: none; stroke: #23282F; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    ]]></style>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#14171C" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowCord" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C8302C"/>
    </marker>
  </defs>

  <rect fill="#FAF7EF" width="1200" height="800"/>

  <g fill="#E8B657" opacity="0.55">
    <circle cx="80" cy="80" r="4"/><circle cx="1120" cy="120" r="4"/>
    <circle cx="60" cy="720" r="4"/><circle cx="1140" cy="700" r="4"/>
  </g>
  <g fill="#C8302C" opacity="0.5">
    <circle cx="160" cy="140" r="3"/><circle cx="1080" cy="640" r="3"/>
  </g>

  <text class="h" x="60" y="76">Wake-audit lifecycle</text>
  <text class="cap" x="60" y="96">five-stage timeline · crash → boot → audit → silent or explicit</text>

  <!-- Reusable card recipe: 200×260, light fill, slight rotation -->

  <!-- Stage 1: crash -->
  <g transform="translate(70,220) rotate(-1.2)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="280" rx="14" fill="#FFFFFF" stroke="#EDE7D7" stroke-width="1.5"/>
    <text class="ch" x="20" y="34">crash / kill</text>
    <!-- icon: lightning bolt -->
    <g transform="translate(76,54)">
      <path class="icon" d="M14 2 L4 18 L11 18 L9 30 L20 12 L13 12 Z"/>
    </g>
    <text class="cap" x="20" y="118" >watchdog · SIGTERM</text>
    <text class="cap" x="20" y="134">timeout · OOM · restart</text>
    <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#5A6069">
      <text x="20" y="170">in-flight turn</text>
      <text x="20" y="186">interrupted</text>
      <text x="20" y="208" fill="#C8302C">stamp written:</text>
      <text x="20" y="222">.wake-audit-pending</text>
      <text x="20" y="238">clean-shutdown.json</text>
    </g>
  </g>
  <g>
    <circle cx="170" cy="208" r="16" fill="#C8302C"/>
    <text class="num" x="170" y="212" text-anchor="middle">1</text>
  </g>

  <!-- Stage 2: boot -->
  <g transform="translate(290,220) rotate(0.8)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="280" rx="14" fill="#FFFFFF" stroke="#EDE7D7" stroke-width="1.5"/>
    <text class="ch" x="20" y="34">fresh boot</text>
    <!-- icon: power -->
    <g transform="translate(76,54)">
      <path class="icon" d="M16 4 L16 16"/>
      <path class="icon" d="M9 9 A 10 10 0 1 0 23 9"/>
    </g>
    <text class="cap" x="20" y="118">start.sh sources env</text>
    <text class="cap" x="20" y="134">SWITCHROOM_PENDING_*</text>
    <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#5A6069">
      <text x="20" y="170">claude --continue</text>
      <text x="20" y="186">hindsight recall fires</text>
      <text x="20" y="208" fill="#23282F">env vars cleared</text>
      <text x="20" y="222">after first read</text>
    </g>
  </g>
  <g>
    <circle cx="390" cy="208" r="16" fill="#E8B657"/>
    <text class="num" x="390" y="212" text-anchor="middle">2</text>
  </g>

  <!-- Stage 3: audit -->
  <g transform="translate(510,220) rotate(-0.6)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="280" rx="14" fill="#FFFFFF" stroke="#EDE7D7" stroke-width="1.5"/>
    <text class="ch" x="20" y="34">wake audit</text>
    <!-- icon: checklist -->
    <g transform="translate(74,54)">
      <rect class="icon" x="2" y="2" width="28" height="28" rx="3"/>
      <path class="icon" d="M8 11 L12 15 L20 7"/>
      <path class="icon" d="M8 22 L24 22"/>
    </g>
    <text class="cap" x="20" y="118">three checks run</text>
    <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#23282F">
      <text x="20" y="142">• owed replies</text>
      <text x="20" y="158">• orphan sub-agents</text>
      <text x="20" y="174">• stale todos</text>
    </g>
    <text class="cap" x="20" y="208">dedup via marker mtime</text>
    <text class="cap" x="20" y="224">vs latest user msg ts</text>
  </g>
  <g>
    <circle cx="610" cy="208" r="16" fill="#E8B657"/>
    <text class="num" x="610" y="212" text-anchor="middle">3</text>
  </g>

  <!-- Stage 4a: clean (top branch) -->
  <g transform="translate(750,140) rotate(-1.2)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="220" rx="14" fill="#FFFFFF" stroke="#EDE7D7" stroke-width="1.5"/>
    <text class="ch" x="20" y="34">all clean</text>
    <!-- icon: check -->
    <g transform="translate(76,54)">
      <circle class="icon" cx="16" cy="16" r="13"/>
      <path class="icon" d="M9 16 L14 21 L23 11"/>
    </g>
    <text class="cap" x="20" y="118">no owed replies</text>
    <text class="cap" x="20" y="134">no orphans · no stale</text>
    <text class="body" x="20" y="170" fill="#4A9B8E">→ stay silent</text>
    <text class="cap" x="20" y="190">answer the new prompt</text>
  </g>
  <g>
    <circle cx="850" cy="128" r="16" fill="#4A9B8E"/>
    <text class="num" x="850" y="132" text-anchor="middle">4</text>
  </g>

  <!-- Stage 4b: explicit (bottom branch) -->
  <g transform="translate(750,440) rotate(0.8)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="200" height="220" rx="14" fill="#FFFFFF" stroke="#EDE7D7" stroke-width="1.5"/>
    <text class="ch" x="20" y="34">found work</text>
    <!-- icon: alert -->
    <g transform="translate(76,54)">
      <path class="icon" d="M16 4 L30 28 L2 28 Z"/>
      <path class="icon" d="M16 13 L16 20"/>
      <circle cx="16" cy="24" r="1.4" fill="#23282F" stroke="none"/>
    </g>
    <text class="cap" x="20" y="118">owed reply · orphan</text>
    <text class="cap" x="20" y="134">sub-agent · stale todo</text>
    <text class="body" x="20" y="170" fill="#C8302C">→ Issue accent</text>
    <text class="cap" x="20" y="190">surface + ask user</text>
  </g>
  <g>
    <circle cx="850" cy="660" r="16" fill="#C8302C"/>
    <text class="num" x="850" y="664" text-anchor="middle">4</text>
  </g>

  <!-- Stage 5: stamp -->
  <g transform="translate(990,300) rotate(-0.6)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="180" height="200" rx="14" fill="#FFFFFF" stroke="#EDE7D7" stroke-width="1.5"/>
    <text class="ch" x="20" y="34">stamp + clear</text>
    <!-- icon: clock -->
    <g transform="translate(70,54)">
      <circle class="icon" cx="16" cy="16" r="13"/>
      <path class="icon" d="M16 8 L16 16 L22 19"/>
    </g>
    <text class="cap" x="20" y="118">touch last-completed</text>
    <text class="cap" x="20" y="134">rm pending sentinel</text>
    <text class="cap" x="20" y="158">future --continue</text>
    <text class="cap" x="20" y="174">respawns won't refire</text>
  </g>
  <g>
    <circle cx="1080" cy="288" r="16" fill="#E8B657"/>
    <text class="num" x="1080" y="292" text-anchor="middle">5</text>
  </g>

  <!-- Flow arrows -->
  <path class="flow" d="M 268 360 L 292 360" marker-end="url(#arrowCord)"/>
  <path class="flow" d="M 488 360 L 512 360" marker-end="url(#arrowCord)"/>
  <!-- branch from stage 3 to 4a (up) and 4b (down) -->
  <path class="flow" d="M 712 340 C 730 280, 740 260, 748 250" marker-end="url(#arrowCord)"/>
  <path class="flow" d="M 712 380 C 730 440, 740 530, 748 550" marker-end="url(#arrowCord)"/>
  <!-- 4a → 5 and 4b → 5 -->
  <path class="flow" d="M 952 290 C 970 320, 980 360, 988 380" marker-end="url(#arrowCord)"/>
  <path class="flow" d="M 952 510 C 970 480, 980 440, 988 420" marker-end="url(#arrowCord)"/>

  <text class="cap" x="600" y="752" text-anchor="middle">guardrail against silent dropped work — fires less than once a week on a healthy system</text>
</svg>
