name: docker-images

# Multi-arch build + push for switchroom's Phase 1b container images.
#
# Triggers:
#   - push to main: build all 5 images for linux/amd64 + linux/arm64,
#     push as `:edge` and `:sha-<short>` to ghcr.io/<owner>/switchroom-<image>.
#   - tag push v*: same matrix, push as `:<tag>` and `:latest`.
#   - pull_request: build only (no push) to validate Dockerfile changes.
#
# Note: the GHCR push path is UNVERIFIED end-to-end as of this PR — no
# tag has been pushed yet. The first tag-push after this workflow lands
# is the e2e proof. If credentials need adjusting, see the
# permissions: { packages: write } block below.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Owner is taken from the repo path so a fork builds against the
  # forker's GHCR namespace.
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node (for dist/ bundling)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun (build.mjs invokes bun build)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps + build dist/
        run: |
          bun install
          npm run build

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (push only on main / tags)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/switchroom-base"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE}:${TAG_VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=${IMAGE}:edge,${IMAGE}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          else
            # PR builds: synthesize a non-pushed tag for build-only mode.
            echo "tags=${IMAGE}:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (and push on main/tag) base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.base
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  build-dependents:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: agent,     file: docker/Dockerfile.agent }
          - { name: broker,    file: docker/Dockerfile.broker }
          - { name: kernel,    file: docker/Dockerfile.kernel }
          - { name: scheduler, file: docker/Dockerfile.scheduler }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node (for dist/ bundling)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun (build.mjs invokes bun build)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps + build dist/
        run: |
          bun install
          npm run build

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (push only on main / tags)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/switchroom-${{ matrix.image.name }}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE}:${TAG_VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=${IMAGE}:edge,${IMAGE}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          else
            # PR builds: synthesize a non-pushed tag for build-only mode.
            echo "tags=${IMAGE}:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (and push on main/tag) ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          push: ${{ github.event_name != 'pull_request' }}
          # Dependent images pull base from the registry. The build-base
          # job above must complete first so :edge / :sha-<short> exists.
          # On PRs the base leg builds-only (no push) — dependents will
          # rebuild the base via local layer cache rather than pulling.
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/switchroom-base:edge
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  e2e:
    # Run the host-side E2E + race tests on a single-arch native runner
    # after the matrix builds. This catches Phase 1a-style aspirational
    # `dist/...` paths and Dockerfile drift before tagging.
    needs: [build-base, build-dependents]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: npm run build
      - name: Build images locally with the test tag
        run: bash tests/docker/build-images.sh
      - name: Run vitest (docker suites only)
        run: npx vitest run tests/docker/
