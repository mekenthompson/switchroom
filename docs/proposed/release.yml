name: release

# Build static `switchroom` CLI binaries for linux/macos x amd64/arm64 on
# every `v*` tag push and attach them to the GitHub release alongside a
# SHA256 checksums file. Pairs with `install.sh` at the repo root, which
# auto-detects platform/arch and downloads the matching artifact.
#
# This workflow is staged at docs/proposed/release.yml because the OAuth
# token used to land code changes here lacks the `workflow` scope GitHub
# requires for writes under `.github/workflows/`. To activate it, an
# operator with a workflow-scoped token must:
#
#   git mv docs/proposed/release.yml .github/workflows/release.yml
#   git commit -m "ci: enable release workflow"
#   git push

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { bun: bun-linux-x64,    name: switchroom-linux-amd64 }
          - { bun: bun-linux-arm64,  name: switchroom-linux-arm64 }
          - { bun: bun-darwin-x64,   name: switchroom-macos-amd64 }
          - { bun: bun-darwin-arm64, name: switchroom-macos-arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate build-info.ts (version + git metadata)
        # scripts/build.mjs writes src/build-info.ts as a side-effect of
        # bundling. The compile target needs that file present at compile
        # time. Run the bundler (cheap; ~1s) so build-info.ts is fresh.
        run: bun scripts/build.mjs

      - name: Compile static binary (${{ matrix.target.name }})
        run: |
          bun build \
            --compile \
            --target=${{ matrix.target.bun }} \
            --minify \
            bin/switchroom.ts \
            --outfile ${{ matrix.target.name }}
          chmod +x ${{ matrix.target.name }}
          ls -lah ${{ matrix.target.name }}

      - name: Upload artifact for checksum job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.name }}
          path: ${{ matrix.target.name }}
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-bins
          merge-multiple: true

      - name: Compute SHA256 checksums
        working-directory: dist-bins
        run: |
          sha256sum switchroom-* > switchroom-checksums.txt
          cat switchroom-checksums.txt

      - name: Attach binaries + checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-bins/switchroom-linux-amd64
            dist-bins/switchroom-linux-arm64
            dist-bins/switchroom-macos-amd64
            dist-bins/switchroom-macos-arm64
            dist-bins/switchroom-checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
