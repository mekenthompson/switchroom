# clerk.yaml — Full example configuration
# See PRD.md for detailed documentation

clerk:
  version: 1
  agents_dir: ~/.clerk/agents

telegram:
  bot_token: "vault:telegram-bot-token"
  forum_chat_id: "-1001234567890"

memory:
  backend: hindsight
  shared_collection: shared
  config:
    provider: ollama
    model: nomic-embed-text

vault:
  path: ~/.clerk/vault.enc

agents:
  health-coach:
    template: health-coach
    topic_name: "Health"
    topic_emoji: "🏋️"
    soul:
      name: Coach
      style: motivational, direct, accountability-focused
      boundaries: not a doctor, always recommend professional care for medical concerns
    tools:
      allow: [calendar, notion, web-search, hindsight]
      deny: [bash, edit, write]
    memory:
      collection: health
      auto_recall: true
    schedule:
      - cron: "0 8 * * *"
        prompt: "Good morning check-in: ask about sleep, energy, and plans for today"
      - cron: "0 20 * * 0"
        prompt: "Weekly health review: summarize this week's activity, meals, and mood"

  exec-assistant:
    template: executive-assistant
    topic_name: "Executive"
    topic_emoji: "📋"
    soul:
      name: Friday
      style: efficient, proactive, anticipates needs
      boundaries: summarize before acting, confirm before sending external communications
    tools:
      allow: [calendar, notion, web-search, hindsight]
      deny: [bash, edit, write]
    memory:
      collection: executive
      auto_recall: true
    schedule:
      - cron: "0 7 * * 1-5"
        prompt: "Daily briefing: summarize today's calendar, pending tasks, and priorities"

  coding:
    template: coding
    topic_name: "Code"
    topic_emoji: "💻"
    soul:
      name: Dev
      style: concise, technical, senior-engineer level
    tools:
      allow: [all]
    memory:
      collection: coding
      auto_recall: true

  assistant:
    template: default
    topic_name: "General"
    topic_emoji: "💬"
    tools:
      allow: [all]
    memory:
      collection: general
      auto_recall: true
