# clerk.yaml — Minimal single-agent setup
# One bot, one agent. The clerk-telegram fork is the default.

clerk:
  version: 1

telegram:
  bot_token: "vault:telegram-bot-token"
  forum_chat_id: "-1001234567890"

memory:
  backend: hindsight
  shared_collection: shared

defaults:
  model: claude-sonnet-4-6
  tools:
    allow: [all]

agents:
  assistant:
    topic_name: "General"
